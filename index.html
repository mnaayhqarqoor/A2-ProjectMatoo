<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEXUS EYE — Multi-Target Detection v2</title>
<meta name="theme-color" content="#060d06">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" id="pwa-manifest">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#060d06;--fg:#c8ffd8;--accent:#00ff88;--accent2:#00e5ff;--danger:#ff2244;--warn:#ffaa00;--card:rgba(6,20,6,0.88);--border:rgba(0,255,136,0.25);--glow:0 0 12px rgba(0,255,136,0.4)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--fg);font-family:'Share Tech Mono',monospace;overflow:hidden;height:100dvh;width:100vw;touch-action:none;user-select:none}
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .7s}
#loader.hidden{opacity:0;pointer-events:none}
.radar{width:110px;height:110px;border-radius:50%;border:2px solid var(--accent);position:relative;animation:radarSpin 2s linear infinite}
.radar::before{content:'';position:absolute;top:0;left:50%;width:50%;height:50%;transform-origin:bottom left;background:conic-gradient(from 0deg,transparent,rgba(0,255,136,0.3));animation:radarSweep 2s linear infinite}
.radar::after{content:'';position:absolute;inset:28%;border-radius:50%;border:1px solid rgba(0,255,136,0.25)}
.radar-dot{position:absolute;top:20%;left:60%;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.2s ease-in-out infinite}
@keyframes radarSpin{to{transform:rotate(360deg)}}
@keyframes radarSweep{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
#loader h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;letter-spacing:6px;color:var(--accent);text-shadow:var(--glow)}
#load-status{color:var(--accent2);font-size:12px;min-height:18px;text-align:center;max-width:280px}
#load-bar{width:200px;height:3px;background:rgba(0,255,136,0.1);border-radius:2px;overflow:hidden}
#load-bar-fill{height:100%;background:var(--accent);width:0%;transition:width .4s;border-radius:2px}
video#cam{display:none}
#main-canvas{position:fixed;inset:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:6px 10px}
#hud-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.hud-box{background:var(--card);border:1px solid var(--border);backdrop-filter:blur(6px);padding:3px 8px;font-size:10px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hud-box i{font-size:9px}
#brand{font-family:'Orbitron',sans-serif;font-weight:900;font-size:12px;letter-spacing:3px;color:var(--accent);text-shadow:var(--glow)}
#fps-val,#tgt-count,#ai-count,#mot-count,#threat-level{font-family:'Orbitron',sans-serif;font-weight:700}
#pip-panel{position:fixed;top:38px;right:0;bottom:90px;width:92px;z-index:10;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;pointer-events:auto}
#pip-panel::-webkit-scrollbar{width:2px}
#pip-panel::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.pip-item{width:84px;height:66px;margin:3px auto;border:1px solid var(--border);background:var(--card);position:relative;cursor:pointer;overflow:hidden;transition:border-color .2s,box-shadow .2s;flex-shrink:0}
.pip-item:active{border-color:var(--accent);box-shadow:var(--glow)}
.pip-item canvas{width:100%;height:100%;object-fit:cover}
.pip-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);font-size:7px;padding:1px 3px;font-family:'Orbitron',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pip-conf{position:absolute;top:1px;right:2px;font-size:7px;font-family:'Orbitron',sans-serif}
.pip-ai{color:var(--accent)}
.pip-motion{color:var(--warn)}
.pip-new{animation:pipFlash .5s ease-out}
@keyframes pipFlash{0%{box-shadow:0 0 14px var(--accent)}100%{box-shadow:none}}
#controls{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:6px 10px;background:linear-gradient(transparent,rgba(6,13,6,0.95) 30%);pointer-events:auto}
#zoom-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
#zoom-row label{font-size:9px;color:var(--accent2);font-family:'Orbitron',sans-serif;min-width:36px}
#zoom-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:rgba(0,255,136,0.12);border-radius:2px;outline:none}
#zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:var(--glow)}
#zoom-val{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--accent);min-width:42px;text-align:right}
#btn-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.ctrl-btn{background:var(--card);border:1px solid var(--border);color:var(--fg);padding:5px 10px;font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s}
.ctrl-btn:active{background:rgba(0,255,136,0.12);border-color:var(--accent);color:var(--accent)}
.ctrl-btn.on{border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}
#scanline{position:fixed;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,0.015) 3px,rgba(0,255,136,0.015) 4px)}
#sweep{position:fixed;left:0;right:0;height:2px;z-index:6;pointer-events:none;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4;animation:sweep 3.5s linear infinite}
@keyframes sweep{0%{top:-2px}100%{top:100%}}
#flash{position:fixed;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s}
#flash.fire{opacity:.6;transition:opacity .02s}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;background:var(--card);border:1px solid var(--accent);padding:10px 20px;font-family:'Orbitron',sans-serif;font-size:13px;color:var(--accent);text-shadow:var(--glow);opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
#toast.show{opacity:1}
#settings-modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;padding:16px}
#settings-modal.open{display:flex}
#settings-box{background:var(--bg);border:1px solid var(--accent);padding:16px;width:100%;max-width:340px;max-height:85vh;overflow-y:auto}
#settings-box h2{font-family:'Orbitron',sans-serif;color:var(--accent);margin-bottom:10px;font-size:14px}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,255,136,0.06);font-size:11px;gap:8px}
.s-row input[type=range]{width:100px;accent-color:var(--accent)}
.s-row input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.s-val{color:var(--accent);font-family:'Orbitron',sans-serif;font-size:9px;min-width:28px;text-align:right}
@media(orientation:portrait){
  #pip-panel{width:100%;height:64px;top:auto;bottom:90px;right:0;overflow-x:auto;overflow-y:hidden;display:flex;flex-wrap:nowrap;flex-direction:row;align-items:center;padding:0 4px}
  .pip-item{flex-shrink:0;width:68px;height:52px;margin:2px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="radar"><div class="radar-dot"></div></div>
  <h1>NEXUS EYE</h1>
  <div id="load-status">Initializing system...</div>
  <div id="load-bar"><div id="load-bar-fill"></div></div>
</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="main-canvas"></canvas>
<div id="scanline"></div>
<div id="sweep"></div>

<div id="hud">
  <div id="hud-top">
    <div class="hud-box" id="brand"><i class="fas fa-crosshairs"></i> NEXUS EYE</div>
    <div class="hud-box"><i class="fas fa-gauge-high" style="color:var(--accent)"></i> <span id="fps-val">0</span></div>
    <div class="hud-box"><i class="fas fa-brain" style="color:var(--accent2)"></i> AI:<span id="ai-count">0</span></div>
    <div class="hud-box"><i class="fas fa-wave-square" style="color:var(--warn)"></i> MOT:<span id="mot-count">0</span></div>
    <div class="hud-box"><i class="fas fa-bullseye" style="color:var(--accent)"></i> <span id="tgt-count">0</span></div>
    <div class="hud-box"><span id="threat-level" style="color:var(--accent)">CLEAR</span></div>
  </div>
</div>

<div id="pip-panel"></div>

<div id="controls">
  <div id="zoom-row">
    <label>ZOOM</label>
    <input type="range" id="zoom-slider" min="1" max="20" step="0.1" value="1">
    <span id="zoom-val">1.0x</span>
  </div>
  <div id="btn-row">
    <button class="ctrl-btn on" id="btn-ai"><i class="fas fa-brain"></i> AI</button>
    <button class="ctrl-btn on" id="btn-motion"><i class="fas fa-wave-square"></i> MOTION</button>
    <button class="ctrl-btn" id="btn-capture"><i class="fas fa-camera"></i> CAPTURE</button>
    <button class="ctrl-btn" id="btn-settings"><i class="fas fa-sliders"></i> CONFIG</button>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>

<div id="settings-modal">
  <div id="settings-box">
    <h2><i class="fas fa-sliders"></i> CONFIGURATION</h2>
    <div class="s-row"><span>AI Sensitivity</span><input type="range" id="s-ai" min="0.05" max="0.6" step="0.01" value="0.12"><span class="s-val" id="sv-ai">0.12</span></div>
    <div class="s-row"><span>Motion Threshold</span><input type="range" id="s-mot" min="10" max="100" step="1" value="35"><span class="s-val" id="sv-mot">35</span></div>
    <div class="s-row"><span>Min Blob Pixels</span><input type="range" id="s-blob" min="8" max="200" step="1" value="30"><span class="s-val" id="sv-blob">30</span></div>
    <div class="s-row"><span>Confirm Frames</span><input type="range" id="s-confirm" min="1" max="10" step="1" value="3"><span class="s-val" id="sv-confirm">3</span></div>
    <div class="s-row"><span>Max Total Targets</span><input type="range" id="s-max" min="10" max="600" step="10" value="100"><span class="s-val" id="sv-max">100</span></div>
    <div class="s-row"><span>Max Motion Targets</span><input type="range" id="s-maxmot" min="5" max="100" step="5" value="30"><span class="s-val" id="sv-maxmot">30</span></div>
    <div class="s-row"><span>Enhance Contrast</span><input type="range" id="s-enh" min="1" max="3" step="0.1" value="1.5"><span class="s-val" id="sv-enh">1.5</span></div>
    <div class="s-row"><span>Shake Compensation</span><input type="checkbox" id="s-shake" checked></div>
    <div class="s-row"><span>Motion Erosion</span><input type="checkbox" id="s-erode" checked></div>
    <div class="s-row"><span>Sound Effects</span><input type="checkbox" id="s-sound" checked></div>
    <div class="s-row"><span>Scan Lines</span><input type="checkbox" id="s-scan" checked></div>
    <div style="margin-top:12px;text-align:center">
      <button class="ctrl-btn" id="btn-close-cfg" style="display:inline-flex"><i class="fas fa-xmark"></i> CLOSE</button>
    </div>
  </div>
</div>

<script>
// =====================================================
// NEXUS EYE v2 — Fixed Motion Detection & Classification
// =====================================================

// ---------- CONFIGURATION ----------
const CFG = {
  aiThreshold: 0.12,       // Higher = fewer false AI positives
  motionThreshold: 35,      // Pixel diff threshold (higher = less noise)
  minBlobArea: 30,          // Minimum blob size in pixels (was 3!)
  confirmFrames: 3,         // Frames before showing a target
  maxTargets: 100,          // Max total displayed targets
  maxMotionTargets: 30,     // Max motion-only targets
  smoothAlpha: 0.35,        // Tracking interpolation (0=stuck,1=instant)
  fadeOutFrames: 20,        // Frames before lost target disappears
  detectionInterval: 150,   // ms between AI detections
  motionInterval: 80,       // ms between motion scans
  enhanceContrast: 1.5,     // Contrast boost before AI detection
  shakeCompensation: true,  // Compensate camera shake
  erodeMotion: true,        // Erode motion mask to kill noise
  soundEnabled: true,
  scanlines: true,
  pipMaxVisible: 40
};

// ---------- CLASS MAPPING (AI only gets real labels) ----------
const CLASS_MAP = {
  person:'PED', car:'VEH', truck:'TRUCK', bus:'BUS',
  motorcycle:'MOTO', bicycle:'CYCLE', airplane:'AIR',
  bird:'AVIAN', boat:'VESSEL', train:'TRAIN',
  traffic_light:'SIG', stop_sign:'SIGN',
  dog:'K9', cat:'FELINE', horse:'EQUINE',
  cow:'BOVINE', sheep:'OVINE', elephant:'ELEPH',
  bear:'URSID', bottle:'OBJ', chair:'OBJ',
  couch:'OBJ', potted_plant:'OBJ', tv:'SCREEN',
  laptop:'SCREEN', cell_phone:'DEVICE', book:'OBJ',
  clock:'OBJ', umbrella:'OBJ', backpack:'BAG',
  handbag:'BAG', suitcase:'BAG', kite:'AVIAN',
  frisbee:'OBJ', skateboard:'OBJ', surfboard:'OBJ',
  tennis_racket:'OBJ', sports_ball:'OBJ', baseball_bat:'OBJ',
  baseball_glove:'OBJ', microwave:'OBJ', oven:'OBJ',
  toaster:'OBJ', sink:'OBJ', refrigerator:'OBJ',
  remote:'DEVICE', keyboard:'DEVICE', mouse:'DEVICE'
};

// ---------- GLOBALS ----------
let model = null;
let video, mainCanvas, mainCtx;
let motionCanvas, motionCtx;
let enhanceCanvas, enhanceCtx;
let pipPanel;

let confirmedTracks = [];   // Visible confirmed tracks
let pendingDetections = [];  // Unconfirmed detections awaiting validation
let nextTrackId = 1;

let zoomLevel = 1, panX = 0.5, panY = 0.5;
let targetZoomLevel = 1, targetPanX = 0.5, targetPanY = 0.5;
let autoZoomTimer = null;

let aiEnabled = true, motionEnabled = true;
let fpsCounter = 0, lastFpsTime = 0, displayFps = 0;
let lastDetectTime = 0, lastMotionTime = 0;
let prevMotionData = null;
let globalMotionDx = 0, globalMotionDy = 0; // Camera shake estimation
let running = true;
let aiResultCount = 0, motResultCount = 0;

// Audio
let audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function playPing(freq=1200, dur=0.05) {
  if(!CFG.soundEnabled||!audioCtx) return;
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value=freq; o.type='sine';
    g.gain.setValueAtTime(0.06,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
  } catch(e){}
}

// ---------- PWA ----------
(function(){
  const m={name:'NEXUS EYE',short_name:'NexusEye',start_url:'.',display:'standalone',background_color:'#060d06',theme_color:'#00ff88',
    icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="#060d06" width="100" height="100" rx="16"/><circle cx="50" cy="50" r="28" stroke="#00ff88" stroke-width="3" fill="none"/><circle cx="50" cy="50" r="3" fill="#00ff88"/></svg>'),sizes:'any',type:'image/svg+xml'}]};
  document.getElementById('pwa-manifest').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
})();

// ---------- CAMERA ----------
async function initCamera() {
  video = document.getElementById('cam');
  const status = document.getElementById('load-status');
  const bar = document.getElementById('load-bar-fill');
  status.textContent = 'Requesting rear camera...';
  bar.style.width = '10%';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:60} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    status.textContent = `Camera active: ${video.videoWidth}x${video.videoHeight}`;
    bar.style.width = '30%';
  } catch(e) {
    status.textContent = 'Camera error: ' + e.message;
    throw e;
  }
}

// ---------- AI MODEL ----------
async function initModel() {
  const status = document.getElementById('load-status');
  const bar = document.getElementById('load-bar-fill');
  try {
    await tf.ready();
    status.textContent = 'TF backend: ' + tf.getBackend();
    bar.style.width = '50%';
    status.textContent = 'Loading COCO-SSD model...';
    bar.style.width = '60%';
    model = await cocoSsd.load({ base:'mobilenet_v2' });
    status.textContent = 'AI model ready.';
    bar.style.width = '100%';
  } catch(e) {
    status.textContent = 'AI failed: ' + e.message + ' (motion-only mode)';
    bar.style.width = '100%';
    model = null;
  }
}

// ---------- CANVAS SETUP ----------
function initCanvases() {
  mainCanvas = document.getElementById('main-canvas');
  mainCtx = mainCanvas.getContext('2d');
  // Motion analysis at low res for speed
  motionCanvas = document.createElement('canvas');
  motionCanvas.width = 160; motionCanvas.height = 120;
  motionCtx = motionCanvas.getContext('2d', { willReadFrequently:true });
  // Enhancement canvas for AI
  enhanceCanvas = document.createElement('canvas');
  enhanceCanvas.width = 320; enhanceCanvas.height = 240;
  enhanceCtx = enhanceCanvas.getContext('2d', { willReadFrequently:true });
  pipPanel = document.getElementById('pip-panel');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}
function resizeCanvas() {
  mainCanvas.width = window.innerWidth;
  mainCanvas.height = window.innerHeight;
}

// ---------- AI DETECTION (Enhanced) ----------
async function runAIDetection() {
  if (!model || !aiEnabled || !video.videoWidth) return [];
  try {
    // Draw with contrast enhancement to catch obscured objects
    enhanceCtx.filter = `contrast(${CFG.enhanceContrast}) brightness(1.08)`;
    enhanceCtx.drawImage(video, 0, 0, 320, 240);
    enhanceCtx.filter = 'none';
    const preds = await model.detect(enhanceCanvas, 50, CFG.aiThreshold);
    const sx = video.videoWidth / 320, sy = video.videoHeight / 240;
    return preds.map(p => ({
      bbox: [p.bbox[0]*sx, p.bbox[1]*sy, p.bbox[2]*sx, p.bbox[3]*sy],
      label: CLASS_MAP[p.class] || p.class.toUpperCase().slice(0,5),
      rawLabel: p.class,
      score: p.score,
      source: 'ai'
    }));
  } catch(e) { return []; }
}

// ---------- MOTION DETECTION (Fixed) ----------
function estimateGlobalMotion(curr, prev, w, h) {
  // Sample 16 regions and compute average shift
  const step = 32;
  let totalDx = 0, totalDy = 0, count = 0;
  const searchR = 8;
  for (let ry = 20; ry < h-20; ry += step) {
    for (let rx = 20; rx < w-20; rx += step) {
      const idx = (ry*w+rx)*4;
      const cr = curr[idx], cg = curr[idx+1], cb = curr[idx+2];
      let bestDist = Infinity, bestOx = 0, bestOy = 0;
      for (let oy = -searchR; oy <= searchR; oy += 2) {
        for (let ox = -searchR; ox <= searchR; ox += 2) {
          const ny = ry+oy, nx = rx+ox;
          if (ny<0||ny>=h||nx<0||nx>=w) continue;
          const pidx = (ny*w+nx)*4;
          const dr = cr-prev[pidx], dg = cg-prev[pidx+1], db = cb-prev[pidx+2];
          const dist = dr*dr+dg*dg+db*db;
          if (dist < bestDist) { bestDist=dist; bestOx=ox; bestOy=oy; }
        }
      }
      totalDx += bestOx; totalDy += bestOy; count++;
    }
  }
  if (count === 0) return { dx:0, dy:0 };
  return { dx: Math.round(totalDx/count), dy: Math.round(totalDy/count) };
}

function runMotionDetection() {
  if (!motionEnabled || !video.videoWidth) return [];
  motionCtx.drawImage(video, 0, 0, 160, 120);
  const current = motionCtx.getImageData(0, 0, 160, 120);
  if (!prevMotionData) { prevMotionData = current; return []; }

  const w = 160, h = 120;
  const cd = current.data, pd = prevMotionData.data;
  const thresh = CFG.motionThreshold * 3; // Per-pixel threshold (sum of RGB diffs)

  // Estimate global motion (camera shake)
  if (CFG.shakeCompensation) {
    const gm = estimateGlobalMotion(cd, pd, w, h);
    globalMotionDx = gm.dx; globalMotionDy = gm.dy;
  }

  // Build difference mask with global motion compensation
  const mask = new Uint8Array(w * h);
  const gmx = globalMotionDx, gmy = globalMotionDy;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y * w + x;
      // Compare with shifted previous frame
      const py = y - gmy, px = x - gmx;
      let diff;
      if (py >= 0 && py < h && px >= 0 && px < w) {
        const pidx = (py * w + px) * 4;
        const cidx = idx * 4;
        diff = Math.abs(cd[cidx]-pd[pidx]) + Math.abs(cd[cidx+1]-pd[pidx+1]) + Math.abs(cd[cidx+2]-pd[pidx+2]);
      } else {
        diff = 0;
      }
      mask[idx] = diff > thresh ? 1 : 0;
    }
  }
  prevMotionData = current;

  // Edge suppression: ignore pixels near frame edges (lens distortion noise)
  const edgeM = 8;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (x < edgeM || x >= w-edgeM || y < edgeM || y >= h-edgeM) mask[y*w+x] = 0;
    }
  }

  // Erosion: remove isolated noise pixels (1->0 if any neighbor is 0)
  if (CFG.erodeMotion) {
    const eroded = new Uint8Array(w * h);
    for (let y = 1; y < h-1; y++) {
      for (let x = 1; x < w-1; x++) {
        const i = y*w+x;
        // 4-connectivity erosion: pixel survives only if all 4 neighbors are also 1
        eroded[i] = (mask[i] && mask[i-1] && mask[i+1] && mask[i-w] && mask[i+w]) ? 1 : 0;
      }
    }
    // Second pass: dilation to restore shrunken blobs
    for (let y = 1; y < h-1; y++) {
      for (let x = 1; x < w-1; x++) {
        const i = y*w+x;
        if (eroded[i] || eroded[i-1] || eroded[i+1] || eroded[i-w] || eroded[i+w]) {
          mask[i] = 1;
        } else {
          mask[i] = 0;
        }
      }
    }
  }

  // Find connected blobs via flood fill
  const labels = new Int32Array(w * h);
  let nextLabel = 1;
  const blobs = [];

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y * w + x;
      if (mask[idx] && !labels[idx]) {
        let minX=x, maxX=x, minY=y, maxY=y, area=0;
        const stack = [x, y];
        while (stack.length) {
          const cy = stack.pop(), cx = stack.pop();
          if (cx<0||cx>=w||cy<0||cy>=h) continue;
          const ci = cy*w+cx;
          if (!mask[ci] || labels[ci]) continue;
          labels[ci] = nextLabel;
          area++;
          if (cx<minX) minX=cx; if (cx>maxX) maxX=cx;
          if (cy<minY) minY=cy; if (cy>maxY) maxY=cy;
          stack.push(cx+1,cy, cx-1,cy, cx,cy+1, cx,cy-1);
        }
        // Filter: minimum area and minimum dimension
        if (area >= CFG.minBlobArea && (maxX-minX)>=2 && (maxY-minY)>=2) {
          const bw = maxX-minX+1, bh = maxY-minY+1;
          const aspect = bw/bh;
          // Filter out very wide/very thin blobs (likely noise bands)
          if (aspect > 0.1 && aspect < 10) {
            blobs.push({ x:minX, y:minY, w:bw, h:bh, area, density:area/(bw*bh) });
          }
        }
        nextLabel++;
      }
    }
  }

  // Sort by area descending, take top N
  blobs.sort((a,b) => b.area - a.area);
  const maxBlobs = CFG.maxMotionTargets;

  const sx = video.videoWidth / 160, sy = video.videoHeight / 120;
  return blobs.slice(0, maxBlobs).map(b => {
    // Expand bbox slightly for context
    const pad = Math.max(2, Math.round(Math.min(b.w, b.h) * 0.2));
    const bx = Math.max(0, (b.x-pad)*sx);
    const by = Math.max(0, (b.y-pad)*sy);
    const bw = (b.w+pad*2)*sx;
    const bh = (b.h+pad*2)*sy;
    // Motion-only: conservative label
    const label = 'MOTION';
    const score = Math.min(0.65, 0.15 + b.density * 0.3 + Math.min(b.area/200, 0.2));
    return { bbox:[bx,by,bw,bh], label, rawLabel:'motion', score, source:'motion' };
  });
}

// ---------- TARGET TRACKING WITH TEMPORAL CONFIRMATION ----------
function updateTracking(allDetections) {
  const usedTracks = new Set();
  const usedDets = new Set();

  // Match detections to existing CONFIRMED tracks
  for (let di = 0; di < allDetections.length; di++) {
    const d = allDetections[di];
    const [dx,dy,dw,dh] = d.bbox;
    const dcx = dx+dw/2, dcy = dy+dh/2;
    let bestDist = Infinity, bestTi = -1;

    for (let ti = 0; ti < confirmedTracks.length; ti++) {
      if (usedTracks.has(ti)) continue;
      const t = confirmedTracks[ti];
      // Only match same source type or allow AI to upgrade motion
      const dist = Math.hypot(t.cx-dcx, t.cy-dcy);
      const maxDist = Math.max(t.w, t.h, dw, dh) * 1.2;
      if (dist < bestDist && dist < maxDist) {
        bestDist = dist; bestTi = ti;
      }
    }

    if (bestTi >= 0) {
      const t = confirmedTracks[bestTi];
      const a = CFG.smoothAlpha;
      t.x = t.x*(1-a) + dx*a;
      t.y = t.y*(1-a) + dy*a;
      t.w = t.w*(1-a) + dw*a;
      t.h = t.h*(1-a) + dh*a;
      t.cx = t.x+t.w/2; t.cy = t.y+t.h/2;
      // AI can upgrade a motion track's label
      if (d.source === 'ai') {
        t.label = d.label;
        t.rawLabel = d.rawLabel;
        t.source = 'ai';
        t.score = Math.max(t.score, d.score);
      } else {
        // Keep existing label if already AI-confirmed
        if (t.source !== 'ai') {
          t.label = d.label;
        }
        t.score = t.score*(1-a*0.3) + d.score*a*0.3;
      }
      t.age++;
      t.missCount = 0;
      t.lastSeen = performance.now();
      usedTracks.add(bestTi);
      usedDets.add(di);
    }
  }

  // Match remaining detections to PENDING detections (for confirmation)
  for (let di = 0; di < allDetections.length; di++) {
    if (usedDets.has(di)) continue;
    const d = allDetections[di];
    const [dx,dy,dw,dh] = d.bbox;
    const dcx = dx+dw/2, dcy = dy+dh/2;
    let matched = false;

    for (let pi = pendingDetections.length - 1; pi >= 0; pi--) {
      const p = pendingDetections[pi];
      const dist = Math.hypot(p.cx-dcx, p.cy-dcy);
      const maxDist = Math.max(p.w, p.h, dw, dh) * 1.5;
      if (dist < maxDist) {
        // Same region detected again → increment confirm counter
        p.confirmCount++;
        const a = 0.5;
        p.x = p.x*(1-a) + dx*a;
        p.y = p.y*(1-a) + dy*a;
        p.w = p.w*(1-a) + dw*a;
        p.h = p.h*(1-a) + dh*a;
        p.cx = p.x+p.w/2; p.cy = p.y+p.h/2;
        // AI always upgrades
        if (d.source === 'ai') {
          p.label = d.label; p.rawLabel = d.rawLabel;
          p.source = 'ai'; p.score = d.score;
        }
        p.lastSeen = performance.now();

        // Check if confirmed
        const requiredFrames = p.source === 'ai' ? 1 : CFG.confirmFrames;
        if (p.confirmCount >= requiredFrames) {
          // Promote to confirmed track
          if (confirmedTracks.length < CFG.maxTargets) {
            confirmedTracks.push({
              id: nextTrackId++, x:p.x, y:p.y, w:p.w, h:p.h,
              cx:p.cx, cy:p.cy, label:p.label, rawLabel:p.rawLabel,
              score:p.score, source:p.source, age:p.confirmCount,
              missCount:0, lastSeen:p.lastSeen, opacity:1, isNew:true
            });
            playPing(p.source==='ai' ? 1600 : 800, 0.04);
          }
          pendingDetections.splice(pi, 1);
        }
        matched = true;
        usedDets.add(di);
        break;
      }
    }

    // New pending detection
    if (!matched && pendingDetections.length < CFG.maxTargets * 2) {
      pendingDetections.push({
        x:dx, y:dy, w:dw, h:dh, cx:dcx, cy:dcy,
        label:d.label, rawLabel:d.rawLabel, score:d.score,
        source:d.source, confirmCount:1, lastSeen:performance.now()
      });
      usedDets.add(di);
    }
  }

  // Age out pending detections not seen recently
  const now = performance.now();
  pendingDetections = pendingDetections.filter(p => now - p.lastSeen < 1500);

  // Fade out missed confirmed tracks
  for (let ti = confirmedTracks.length - 1; ti >= 0; ti--) {
    const t = confirmedTracks[ti];
    if (!usedTracks.has(ti)) {
      t.missCount++;
      t.opacity = Math.max(0, 1 - t.missCount / CFG.fadeOutFrames);
      if (t.missCount > CFG.fadeOutFrames) {
        confirmedTracks.splice(ti, 1);
      }
    }
  }
}

// ---------- ZOOM ----------
function setZoom(z, px, py, animate=true) {
  targetZoomLevel = Math.max(1, Math.min(20, z));
  if (px !== undefined) targetPanX = Math.max(0, Math.min(1, px));
  if (py !== undefined) targetPanY = Math.max(0, Math.min(1, py));
  if (!animate) { zoomLevel=targetZoomLevel; panX=targetPanX; panY=targetPanY; }
  document.getElementById('zoom-slider').value = targetZoomLevel;
  document.getElementById('zoom-val').textContent = targetZoomLevel.toFixed(1) + 'x';
}
function interpolateZoom() {
  const a = 0.1;
  zoomLevel += (targetZoomLevel-zoomLevel)*a;
  panX += (targetPanX-panX)*a;
  panY += (targetPanY-panY)*a;
}

// ---------- RENDER ----------
function getVisibleRect() {
  const vw=video.videoWidth, vh=video.videoHeight;
  const rw=vw/zoomLevel, rh=vh/zoomLevel;
  return { x:(vw-rw)*panX, y:(vh-rh)*panY, w:rw, h:rh };
}
function vidToCanvas(vx, vy) {
  const r=getVisibleRect();
  return [(vx-r.x)/r.w*mainCanvas.width, (vy-r.y)/r.h*mainCanvas.height];
}

function drawFrame() {
  if (!video.videoWidth) return;
  const cw=mainCanvas.width, ch=mainCanvas.height;
  const r=getVisibleRect();

  // Draw zoomed video
  mainCtx.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, cw, ch);

  // Subtle green tint
  mainCtx.fillStyle = 'rgba(0,18,0,0.04)';
  mainCtx.fillRect(0,0,cw,ch);

  // Grid
  mainCtx.strokeStyle = 'rgba(0,255,136,0.03)';
  mainCtx.lineWidth = 0.5;
  const gs = 80;
  for (let gx=0;gx<cw;gx+=gs){ mainCtx.beginPath();mainCtx.moveTo(gx,0);mainCtx.lineTo(gx,ch);mainCtx.stroke(); }
  for (let gy=0;gy<ch;gy+=gs){ mainCtx.beginPath();mainCtx.moveTo(0,gy);mainCtx.lineTo(cw,gy);mainCtx.stroke(); }

  // Draw confirmed tracks
  for (const t of confirmedTracks) {
    const [bx,by] = vidToCanvas(t.x, t.y);
    const bw = t.w/r.w*cw;
    const bh = t.h/r.h*ch;
    if (bx+bw<-10||bx>cw+10||by+bh<-10||by>ch+10) continue;
    if (bw<3||bh<3) continue;

    const alpha = t.opacity;
    const isAI = t.source === 'ai';
    const confPct = Math.round(t.score*100);

    // Color by source and confidence
    let color, bgColor;
    if (isAI) {
      color = confPct > 50 ? `rgba(0,255,136,${alpha})` : confPct > 25 ? `rgba(0,229,255,${alpha})` : `rgba(255,170,0,${alpha})`;
      bgColor = 'rgba(0,255,136,0.08)';
    } else {
      color = `rgba(255,170,0,${alpha*0.7})`;
      bgColor = 'rgba(255,170,0,0.04)';
    }

    mainCtx.save();

    // Fill
    mainCtx.fillStyle = bgColor;
    mainCtx.fillRect(bx, by, bw, bh);

    // Animated dashed border
    mainCtx.strokeStyle = color;
    mainCtx.lineWidth = isAI ? 1.5 : 1;
    mainCtx.setLineDash([5,3]);
    mainCtx.lineDashOffset = -(performance.now()/50);
    mainCtx.strokeRect(bx, by, bw, bh);
    mainCtx.setLineDash([]);

    // Corner brackets
    if (bw > 12 && bh > 12) {
      const cr = Math.min(6, bw*0.15, bh*0.15);
      mainCtx.lineWidth = 2;
      mainCtx.strokeStyle = color;
      mainCtx.beginPath();
      mainCtx.moveTo(bx,by+cr); mainCtx.lineTo(bx,by); mainCtx.lineTo(bx+cr,by);
      mainCtx.moveTo(bx+bw-cr,by); mainCtx.lineTo(bx+bw,by); mainCtx.lineTo(bx+bw,by+cr);
      mainCtx.moveTo(bx+bw,by+bh-cr); mainCtx.lineTo(bx+bw,by+bh); mainCtx.lineTo(bx+bw-cr,by+bh);
      mainCtx.moveTo(bx+cr,by+bh); mainCtx.lineTo(bx,by+bh); mainCtx.lineTo(bx,by+bh-cr);
      mainCtx.stroke();

      // Center crosshair
      const ccx=bx+bw/2, ccy=by+bh/2;
      const crossR = Math.min(bw,bh)*0.15;
      mainCtx.lineWidth = 1;
      mainCtx.beginPath();
      mainCtx.moveTo(ccx-crossR,ccy); mainCtx.lineTo(ccx+crossR,ccy);
      mainCtx.moveTo(ccx,ccy-crossR); mainCtx.lineTo(ccx,ccy+crossR);
      mainCtx.stroke();
    }

    // Label
    const srcTag = isAI ? '' : '[M] ';
    const labelText = `${srcTag}${t.label} ${confPct}%`;
    mainCtx.font = '9px Orbitron, monospace';
    const tw = mainCtx.measureText(labelText).width;
    mainCtx.fillStyle = `rgba(0,0,0,${alpha*0.8})`;
    mainCtx.fillRect(bx, by-12, tw+6, 11);
    mainCtx.fillStyle = color;
    mainCtx.fillText(labelText, bx+3, by-3);

    // Track ID
    mainCtx.font = '7px Share Tech Mono, monospace';
    mainCtx.fillStyle = `rgba(0,229,255,${alpha*0.6})`;
    mainCtx.fillText('#'+t.id, bx+bw-16, by+bh+8);

    mainCtx.restore();
  }

  // Center reticle when zoomed
  if (zoomLevel > 1.3) {
    const cx=cw/2, cy=ch/2;
    mainCtx.strokeStyle = 'rgba(0,255,136,0.25)';
    mainCtx.lineWidth = 1;
    mainCtx.beginPath(); mainCtx.arc(cx,cy,18,0,Math.PI*2); mainCtx.stroke();
    mainCtx.beginPath();
    mainCtx.moveTo(cx-28,cy); mainCtx.lineTo(cx-7,cy);
    mainCtx.moveTo(cx+7,cy); mainCtx.lineTo(cx+28,cy);
    mainCtx.moveTo(cx,cy-28); mainCtx.lineTo(cx,cy-7);
    mainCtx.moveTo(cx,cy+7); mainCtx.lineTo(cx,cy+28);
    mainCtx.stroke();
  }

  // Vignette
  const grad = mainCtx.createRadialGradient(cw/2,ch/2,Math.min(cw,ch)*0.25,cw/2,ch/2,Math.max(cw,ch)*0.7);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,8,0,0.45)');
  mainCtx.fillStyle = grad;
  mainCtx.fillRect(0,0,cw,ch);
}

// ---------- PIP PANEL ----------
let pipElements = [];
function updatePiPs() {
  const visible = confirmedTracks.filter(t => t.opacity > 0.3).slice(0, CFG.pipMaxVisible);
  while (pipElements.length < visible.length) {
    const el = document.createElement('div');
    el.className = 'pip-item';
    const cvs = document.createElement('canvas');
    cvs.width = 84; cvs.height = 66;
    el.appendChild(cvs);
    const lbl = document.createElement('div');
    lbl.className = 'pip-label';
    el.appendChild(lbl);
    const conf = document.createElement('div');
    conf.className = 'pip-conf';
    el.appendChild(conf);
    pipPanel.appendChild(el);
    pipElements.push({ el, cvs, lbl, conf, trackId: -1 });
  }
  for (let i = 0; i < pipElements.length; i++) {
    const pe = pipElements[i];
    if (i < visible.length) {
      pe.el.style.display = '';
      const t = visible[i];
      const ctx = pe.cvs.getContext('2d');
      const pad = 0.3;
      const sx = t.x - t.w*pad, sy = t.y - t.h*pad;
      const sw = t.w*(1+pad*2), sh = t.h*(1+pad*2);
      ctx.drawImage(video, Math.max(0,sx), Math.max(0,sy), Math.max(1,sw), Math.max(1,sh), 0, 0, 84, 66);
      ctx.fillStyle = t.source==='ai' ? 'rgba(0,255,136,0.03)' : 'rgba(255,170,0,0.03)';
      ctx.fillRect(0,0,84,66);
      pe.lbl.textContent = (t.source==='ai'?'':'[M] ') + t.label;
      pe.lbl.className = 'pip-label ' + (t.source==='ai' ? 'pip-ai' : 'pip-motion');
      pe.conf.textContent = Math.round(t.score*100) + '%';
      pe.conf.style.color = t.source==='ai' ? 'var(--accent)' : 'var(--warn)';
      if (t.isNew && pe.trackId !== t.id) {
        pe.el.classList.remove('pip-new');
        void pe.el.offsetWidth;
        pe.el.classList.add('pip-new');
      }
      pe.trackId = t.id;
      pe.el.onclick = () => autoZoomToTarget(t);
    } else {
      pe.el.style.display = 'none';
    }
  }
}

// ---------- AUTO ZOOM & CAPTURE ----------
function autoZoomToTarget(t) {
  initAudio();
  playPing(1800, 0.08);
  const zfw = video.videoWidth / (t.w/0.6);
  const zfh = video.videoHeight / (t.h/0.6);
  const z = Math.min(zfw, zfh, 20);
  const px = t.cx / video.videoWidth;
  const py = t.cy / video.videoHeight;
  setZoom(z, px, py, true);
  showToast('LOCKING #' + t.id + ' ' + t.label);
  clearTimeout(autoZoomTimer);
  autoZoomTimer = setTimeout(() => {
    captureSnapshot(t);
    setTimeout(() => { setZoom(1,0.5,0.5,true); showToast('CAPTURED #'+t.id); }, 800);
  }, 1200);
}

function captureSnapshot(t) {
  const flash = document.getElementById('flash');
  flash.classList.add('fire');
  setTimeout(() => flash.classList.remove('fire'), 120);
  const pad = 0.4;
  const sx = Math.max(0, t.x-t.w*pad);
  const sy = Math.max(0, t.y-t.h*pad);
  const sw = Math.min(video.videoWidth-sx, t.w*(1+pad*2));
  const sh = Math.min(video.videoHeight-sy, t.h*(1+pad*2));
  const cap = document.createElement('canvas');
  cap.width = Math.round(sw*2); cap.height = Math.round(sh*2);
  const cctx = cap.getContext('2d');
  cctx.filter = 'contrast(1.3) brightness(1.05) sharpen(1)';
  cctx.drawImage(video, sx, sy, sw, sh, 0, 0, cap.width, cap.height);
  cctx.filter = 'none';
  cctx.font = 'bold 14px Orbitron, monospace';
  cctx.fillStyle = '#00ff88';
  cctx.fillText(`NEXUS EYE | ${t.label} | ${Math.round(t.score*100)}% | #${t.id}`, 8, 20);
  cctx.fillText(new Date().toISOString(), 8, 38);
  const link = document.createElement('a');
  link.download = `nexus_${t.label}_${t.id}_${Date.now()}.png`;
  link.href = cap.toDataURL('image/png');
  link.click();
  playPing(2400, 0.12);
}

function manualCapture() {
  initAudio();
  const flash = document.getElementById('flash');
  flash.classList.add('fire');
  setTimeout(() => flash.classList.remove('fire'), 120);
  const r = getVisibleRect();
  const cap = document.createElement('canvas');
  cap.width = Math.round(r.w); cap.height = Math.round(r.h);
  const cctx = cap.getContext('2d');
  cctx.filter = 'contrast(1.2) brightness(1.05)';
  cctx.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, cap.width, cap.height);
  cctx.filter = 'none';
  cctx.font = 'bold 16px Orbitron, monospace';
  cctx.fillStyle = '#00ff88';
  cctx.fillText(`NEXUS EYE | ZOOM ${zoomLevel.toFixed(1)}x`, 8, 24);
  cctx.fillText(new Date().toISOString(), 8, 44);
  const link = document.createElement('a');
  link.download = `nexus_capture_${Date.now()}.png`;
  link.href = cap.toDataURL('image/png');
  link.click();
  playPing(2000, 0.08);
  showToast('FRAME CAPTURED');
}

// ---------- TOAST ----------
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ---------- HUD ----------
function updateHUD() {
  const aiT = confirmedTracks.filter(t=>t.source==='ai').length;
  const motT = confirmedTracks.filter(t=>t.source==='motion').length;
  document.getElementById('ai-count').textContent = aiT;
  document.getElementById('mot-count').textContent = motT;
  document.getElementById('tgt-count').textContent = confirmedTracks.length;
  const tl = document.getElementById('threat-level');
  if (confirmedTracks.length < 3) { tl.textContent='CLEAR'; tl.style.color='#00ff88'; }
  else if (confirmedTracks.length < 10) { tl.textContent='ALERT'; tl.style.color='#ffaa00'; }
  else if (confirmedTracks.length < 25) { tl.textContent='HIGH'; tl.style.color='#ff6622'; }
  else { tl.textContent='CRITICAL'; tl.style.color='#ff2244'; }
}

// ---------- TOUCH / PINCH ZOOM ----------
let lastPinchDist = 0, isPinching = false;
function handleTouchStart(e) {
  if (e.touches.length === 2) {
    isPinching = true;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.hypot(dx, dy);
  } else if (e.touches.length === 1) {
    handleCanvasTap(e.touches[0].clientX, e.touches[0].clientY);
  }
}
function handleTouchMove(e) {
  if (!isPinching || e.touches.length !== 2) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.hypot(dx, dy);
  if (lastPinchDist > 0) setZoom(zoomLevel * (dist / lastPinchDist));
  lastPinchDist = dist;
}
function handleTouchEnd() { isPinching = false; lastPinchDist = 0; }
function handleCanvasTap(cx, cy) {
  const r = getVisibleRect();
  const vx = cx/mainCanvas.width*r.w + r.x;
  const vy = cy/mainCanvas.height*r.h + r.y;
  for (const t of confirmedTracks) {
    if (vx>=t.x && vx<=t.x+t.w && vy>=t.y && vy<=t.y+t.h) {
      autoZoomToTarget(t);
      return;
    }
  }
}

// ---------- MAIN LOOP ----------
let pendingMotionDetections = [];
let pendingAIDetections = [];

async function mainLoop() {
  if (!running) return;
  const now = performance.now();

  // FPS
  fpsCounter++;
  if (now - lastFpsTime > 1000) {
    displayFps = fpsCounter;
    fpsCounter = 0;
    lastFpsTime = now;
    document.getElementById('fps-val').textContent = displayFps;
  }

  // AI detection (slower interval)
  if (aiEnabled && model && now - lastDetectTime > CFG.detectionInterval) {
    lastDetectTime = now;
    runAIDetection().then(results => { pendingAIDetections = results; });
  }

  // Motion detection (faster interval)
  if (motionEnabled && now - lastMotionTime > CFG.motionInterval) {
    lastMotionTime = now;
    const motResults = runMotionDetection();
    pendingMotionDetections = motResults;
  }

  // Merge detections: AI always takes priority
  const allDetections = [...pendingAIDetections];

  // Only add motion detections that don't overlap with AI detections
  for (const md of pendingMotionDetections) {
    let overlapsAI = false;
    for (const ad of pendingAIDetections) {
      const ox = Math.max(0, Math.min(md.bbox[0]+md.bbox[2], ad.bbox[0]+ad.bbox[2]) - Math.max(md.bbox[0], ad.bbox[0]));
      const oy = Math.max(0, Math.min(md.bbox[1]+md.bbox[3], ad.bbox[1]+ad.bbox[3]) - Math.max(md.bbox[1], ad.bbox[1]));
      const overlapArea = ox * oy;
      const mdArea = md.bbox[2] * md.bbox[3];
      if (mdArea > 0 && overlapArea / mdArea > 0.4) { overlapsAI = true; break; }
    }
    if (!overlapsAI) allDetections.push(md);
  }

  // Update tracking with temporal confirmation
  updateTracking(allDetections);

  // Zoom interpolation
  interpolateZoom();

  // Render
  drawFrame();

  // PiP + HUD at lower rate
  if (fpsCounter % 5 === 0) {
    updatePiPs();
    updateHUD();
  }

  // Mark tracks as no longer new
  for (const t of confirmedTracks) t.isNew = false;

  requestAnimationFrame(mainLoop);
}

// ---------- SETTINGS ----------
function setupSettings() {
  document.getElementById('btn-settings').onclick = () => document.getElementById('settings-modal').classList.add('open');
  document.getElementById('btn-close-cfg').onclick = () => document.getElementById('settings-modal').classList.remove('open');

  const bind = (id, key, isInt, valId) => {
    const el = document.getElementById(id);
    el.oninput = function() {
      CFG[key] = isInt ? parseInt(this.value) : parseFloat(this.value);
      if (valId) document.getElementById(valId).textContent = this.value;
    };
  };
  bind('s-ai','aiThreshold',false,'sv-ai');
  bind('s-mot','motionThreshold',true,'sv-mot');
  bind('s-blob','minBlobArea',true,'sv-blob');
  bind('s-confirm','confirmFrames',true,'sv-confirm');
  bind('s-max','maxTargets',true,'sv-max');
  bind('s-maxmot','maxMotionTargets',true,'sv-maxmot');
  bind('s-enh','enhanceContrast',false,'sv-enh');

  document.getElementById('s-shake').onchange = function() { CFG.shakeCompensation = this.checked; };
  document.getElementById('s-erode').onchange = function() { CFG.erodeMotion = this.checked; };
  document.getElementById('s-sound').onchange = function() { CFG.soundEnabled = this.checked; };
  document.getElementById('s-scan').onchange = function() {
    CFG.scanlines = this.checked;
    document.getElementById('scanline').style.display = this.checked ? '' : 'none';
    document.getElementById('sweep').style.display = this.checked ? '' : 'none';
  };
}

// ---------- BUTTONS ----------
function setupButtons() {
  document.getElementById('btn-ai').onclick = function() {
    aiEnabled = !aiEnabled;
    this.classList.toggle('on', aiEnabled);
  };
  document.getElementById('btn-motion').onclick = function() {
    motionEnabled = !motionEnabled;
    this.classList.toggle('on', motionEnabled);
  };
  document.getElementById('btn-capture').onclick = manualCapture;
  document.getElementById('zoom-slider').oninput = function() {
    setZoom(parseFloat(this.value));
  };
  mainCanvas.addEventListener('touchstart', handleTouchStart, { passive:false });
  mainCanvas.addEventListener('touchmove', handleTouchMove, { passive:false });
  mainCanvas.addEventListener('touchend', handleTouchEnd);
  mainCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    setZoom(zoomLevel * (e.deltaY > 0 ? 0.92 : 1.08));
  }, { passive:false });
}

// ---------- INIT ----------
async function init() {
  try {
    initCanvases();
    await initCamera();
    await initModel();
    setupButtons();
    setupSettings();
    setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
    requestAnimationFrame(mainLoop);
  } catch(e) {
    document.getElementById('load-status').textContent = 'FATAL: ' + e.message;
  }
}

document.addEventListener('click', initAudio, { once:true });
document.addEventListener('touchstart', initAudio, { once:true });
init();
</script>
