<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEXUS EYE — Multi-Target Detection</title>
<meta name="theme-color" content="#060d06">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" id="pwa-manifest">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#060d06;--fg:#c8ffd8;--accent:#00ff88;--accent2:#00e5ff;--danger:#ff2244;--warn:#ffaa00;--card:rgba(6,20,6,0.85);--border:rgba(0,255,136,0.25);--glow:0 0 12px rgba(0,255,136,0.4)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--fg);font-family:'Share Tech Mono',monospace;overflow:hidden;height:100dvh;width:100vw;touch-action:none;user-select:none}
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s}
#loader.hidden{opacity:0;pointer-events:none}
.radar{width:120px;height:120px;border-radius:50%;border:2px solid var(--accent);position:relative;animation:radarSpin 2s linear infinite}
.radar::before{content:'';position:absolute;top:0;left:50%;width:50%;height:50%;transform-origin:bottom left;background:conic-gradient(from 0deg,transparent,rgba(0,255,136,0.3));animation:radarSweep 2s linear infinite}
.radar::after{content:'';position:absolute;inset:30%;border-radius:50%;border:1px solid rgba(0,255,136,0.3)}
@keyframes radarSpin{to{transform:rotate(360deg)}}
@keyframes radarSweep{to{transform:rotate(360deg)}}
#loader h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:28px;letter-spacing:6px;color:var(--accent);text-shadow:var(--glow)}
#load-status{color:var(--accent2);font-size:13px;min-height:20px}
#main-canvas{position:fixed;inset:0;width:100%;height:100%}
video#cam{display:none}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:8px 12px}
#hud-top{display:flex;justify-content:space-between;align-items:center}
.hud-box{background:var(--card);border:1px solid var(--border);backdrop-filter:blur(8px);padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:6px}
.hud-box i{font-size:10px}
#brand{font-family:'Orbitron',sans-serif;font-weight:900;font-size:14px;letter-spacing:3px;color:var(--accent);text-shadow:var(--glow)}
#fps-val,#tgt-count,#threat-level{font-family:'Orbitron',sans-serif;font-weight:700}
#pip-panel{position:fixed;top:44px;right:0;bottom:80px;width:96px;z-index:10;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;pointer-events:auto}
#pip-panel::-webkit-scrollbar{width:3px}
#pip-panel::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.pip-item{width:88px;height:72px;margin:4px auto;border:1px solid var(--border);background:var(--card);position:relative;cursor:pointer;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.pip-item:hover,.pip-item:active{border-color:var(--accent);box-shadow:var(--glow)}
.pip-item canvas{width:100%;height:100%;object-fit:cover}
.pip-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.75);font-size:8px;padding:1px 3px;color:var(--accent);font-family:'Orbitron',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pip-conf{position:absolute;top:1px;right:2px;font-size:7px;color:var(--warn);font-family:'Orbitron',sans-serif}
.pip-new{animation:pipPulse .6s ease-out}
@keyframes pipPulse{0%{box-shadow:0 0 16px var(--accent)}100%{box-shadow:none}}
#controls{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:8px 12px;background:linear-gradient(transparent,rgba(6,13,6,0.95));pointer-events:auto}
#zoom-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
#zoom-row label{font-size:10px;color:var(--accent2);font-family:'Orbitron',sans-serif;min-width:40px}
#zoom-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(0,255,136,0.15);border-radius:2px;outline:none}
#zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:var(--glow)}
#zoom-val{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--accent);min-width:48px;text-align:right}
#btn-row{display:flex;gap:8px;justify-content:center}
.ctrl-btn{background:var(--card);border:1px solid var(--border);color:var(--fg);padding:6px 14px;font-size:11px;font-family:'Share Tech Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.ctrl-btn:active{background:rgba(0,255,136,0.15);border-color:var(--accent);color:var(--accent)}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}
#scanline{position:fixed;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.02) 2px,rgba(0,255,136,0.02) 4px)}
#sweep{position:fixed;left:0;right:0;height:2px;z-index:6;pointer-events:none;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5;animation:sweep 3s linear infinite}
@keyframes sweep{0%{top:-2px}100%{top:100%}}
#flash{position:fixed;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s}
#flash.fire{opacity:.7;transition:opacity .02s}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;background:var(--card);border:1px solid var(--accent);padding:12px 24px;font-family:'Orbitron',sans-serif;font-size:14px;color:var(--accent);text-shadow:var(--glow);opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#settings-modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;padding:20px}
#settings-modal.open{display:flex}
#settings-box{background:var(--bg);border:1px solid var(--accent);padding:20px;width:100%;max-width:340px;max-height:80vh;overflow-y:auto}
#settings-box h2{font-family:'Orbitron',sans-serif;color:var(--accent);margin-bottom:12px;font-size:16px}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,255,136,0.08);font-size:12px}
.s-row input[type=range]{width:120px}
.s-row input[type=checkbox]{accent-color:var(--accent)}
@media(orientation:portrait){#pip-panel{width:100%;height:72px;top:auto;bottom:80px;right:0;overflow-x:auto;overflow-y:hidden;display:flex;flex-wrap:nowrap}.pip-item{flex-shrink:0;width:72px;height:56px}}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="radar"></div>
  <h1>NEXUS EYE</h1>
  <div id="load-status">Initializing system...</div>
</div>

<!-- Camera Video (hidden) -->
<video id="cam" autoplay playsinline muted></video>

<!-- Main Rendering Canvas -->
<canvas id="main-canvas"></canvas>

<!-- Scan Lines Overlay -->
<div id="scanline"></div>
<div id="sweep"></div>

<!-- HUD Top Bar -->
<div id="hud">
  <div id="hud-top">
    <div class="hud-box" id="brand"><i class="fas fa-crosshairs"></i> NEXUS EYE</div>
    <div class="hud-box"><i class="fas fa-gauge-high" style="color:var(--accent)"></i> <span id="fps-val">0</span> FPS</div>
    <div class="hud-box"><i class="fas fa-bullseye" style="color:var(--warn)"></i> <span id="tgt-count">0</span> TGT</div>
    <div class="hud-box" id="threat-box"><span id="threat-level" style="color:var(--accent)">CLEAR</span></div>
  </div>
</div>

<!-- PiP Panel -->
<div id="pip-panel"></div>

<!-- Bottom Controls -->
<div id="controls">
  <div id="zoom-row">
    <label>ZOOM</label>
    <input type="range" id="zoom-slider" min="1" max="20" step="0.1" value="1">
    <span id="zoom-val">1.0x</span>
  </div>
  <div id="btn-row">
    <button class="ctrl-btn active" id="btn-ai"><i class="fas fa-brain"></i> AI</button>
    <button class="ctrl-btn active" id="btn-motion"><i class="fas fa-wave-square"></i> MOTION</button>
    <button class="ctrl-btn" id="btn-capture"><i class="fas fa-camera"></i> CAPTURE</button>
    <button class="ctrl-btn" id="btn-settings"><i class="fas fa-gear"></i> CONFIG</button>
  </div>
</div>

<!-- Flash Effect -->
<div id="flash"></div>
<!-- Toast -->
<div id="toast"></div>

<!-- Settings Modal -->
<div id="settings-modal">
  <div id="settings-box">
    <h2><i class="fas fa-sliders"></i> CONFIGURATION</h2>
    <div class="s-row"><span>AI Sensitivity</span><input type="range" id="s-ai-thresh" min="0.01" max="0.5" step="0.01" value="0.05"></div>
    <div class="s-row"><span>Motion Sensitivity</span><input type="range" id="s-mot-thresh" min="5" max="80" step="1" value="18"></div>
    <div class="s-row"><span>Min Blob Size</span><input type="range" id="s-min-blob" min="1" max="50" step="1" value="3"></div>
    <div class="s-row"><span>Max Targets</span><input type="range" id="s-max-tgt" min="20" max="700" step="10" value="200"></div>
    <div class="s-row"><span>Smooth Tracking</span><input type="checkbox" id="s-smooth" checked></div>
    <div class="s-row"><span>Sound Effects</span><input type="checkbox" id="s-sound" checked></div>
    <div class="s-row"><span>Scan Lines</span><input type="checkbox" id="s-scanlines" checked></div>
    <div class="s-row"><span>Enhancement</span><input type="range" id="s-enhance" min="1" max="3" step="0.1" value="1.4"></div>
    <div style="margin-top:14px;text-align:center">
      <button class="ctrl-btn" id="btn-close-settings" style="display:inline-flex"><i class="fas fa-xmark"></i> CLOSE</button>
    </div>
  </div>
</div>

<script>
// ===========================================================
// NEXUS EYE — Multi-Target Real-Time Detection System
// ===========================================================

// ---------- CONFIG ----------
const CFG = {
  aiThreshold: 0.05,
  motionThreshold: 18,
  minBlobArea: 3,
  maxTargets: 200,
  smoothAlpha: 0.3,
  fadeOutFrames: 25,
  detectionInterval: 120,
  motionInterval: 50,
  enhanceContrast: 1.4,
  soundEnabled: true,
  scanlines: true,
  pipMaxVisible: 60
};

// ---------- CLASS MAP ----------
const CLASS_MAP = {
  person: 'PED', car: 'VEH', truck: 'TRUCK', bus: 'BUS',
  motorcycle: 'MOTO', bicycle: 'CYCLE', airplane: 'AIR',
  bird: 'AVIAN', boat: 'VESSEL', train: 'TRAIN',
  traffic_light: 'SIG', stop_sign: 'SIGN', dog: 'K9',
  cat: 'FELINE', horse: 'EQUINE', cow: 'BOVINE',
  sheep: 'OVINE', elephant: 'ELEPH', bear: 'URSID'
};
const SKY_CLASSES = new Set(['AIR','AVIAN']);

// ---------- GLOBALS ----------
let model = null;
let video, mainCanvas, mainCtx;
let motionCanvas, motionCtx;
let enhanceCanvas, enhanceCtx;
let pipPanel;

let tracks = [];
let nextTrackId = 1;
let zoomLevel = 1, panX = 0.5, panY = 0.5;
let targetZoomLevel = 1, targetPanX = 0.5, targetPanY = 0.5;
let autoZoomTarget = null, autoZoomTimer = null;

let aiEnabled = true, motionEnabled = true;
let fpsCounter = 0, lastFpsTime = 0, displayFps = 0;
let lastDetectTime = 0, lastMotionTime = 0;
let prevMotionData = null;
let running = true;

// Audio context for ping sounds
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playPing(freq = 1200, dur = 0.06) {
  if (!CFG.soundEnabled || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// ---------- PWA SETUP ----------
(function setupPWA() {
  const manifest = {
    name: 'NEXUS EYE', short_name: 'NexusEye',
    start_url: '.', display: 'standalone',
    background_color: '#060d06', theme_color: '#00ff88',
    icons: [{ src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="#060d06" width="100" height="100" rx="16"/><circle cx="50" cy="50" r="30" stroke="#00ff88" stroke-width="4" fill="none"/><circle cx="50" cy="50" r="4" fill="#00ff88"/><line x1="50" y1="10" x2="50" y2="30" stroke="#00ff88" stroke-width="2"/></svg>'), sizes: 'any', type: 'image/svg+xml' }]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
  if ('serviceWorker' in navigator) {
    const sw = `self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))).catch(() => {});
  }
})();

// ---------- CAMERA ----------
async function initCamera() {
  video = document.getElementById('cam');
  const status = document.getElementById('load-status');
  status.textContent = 'Requesting camera access...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    status.textContent = 'Camera active. Loading AI model...';
  } catch(e) {
    status.textContent = 'Camera error: ' + e.message;
    throw e;
  }
}

// ---------- AI MODEL ----------
async function initModel() {
  const status = document.getElementById('load-status');
  try {
    await tf.ready();
    status.textContent = 'TF.js backend: ' + tf.getBackend() + '. Loading COCO-SSD...';
    model = await cocoSsd.load({ base: 'mobilenet_v2' });
    status.textContent = 'Model loaded. Ready.';
  } catch(e) {
    status.textContent = 'AI model failed: ' + e.message + ' (motion-only mode)';
    model = null;
  }
}

// ---------- CANVAS SETUP ----------
function initCanvases() {
  mainCanvas = document.getElementById('main-canvas');
  mainCtx = mainCanvas.getContext('2d');
  motionCanvas = document.createElement('canvas');
  motionCanvas.width = 160; motionCanvas.height = 120;
  motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
  enhanceCanvas = document.createElement('canvas');
  enhanceCanvas.width = 320; enhanceCanvas.height = 240;
  enhanceCtx = enhanceCanvas.getContext('2d', { willReadFrequently: true });
  pipPanel = document.getElementById('pip-panel');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  mainCanvas.width = window.innerWidth;
  mainCanvas.height = window.innerHeight;
}

// ---------- AI DETECTION ----------
async function runAIDetection() {
  if (!model || !aiEnabled || !video.videoWidth) return [];
  try {
    // Draw to enhance canvas with contrast boost
    enhanceCtx.filter = `contrast(${CFG.enhanceContrast}) brightness(1.1)`;
    enhanceCtx.drawImage(video, 0, 0, 320, 240);
    enhanceCtx.filter = 'none';
    const preds = await model.detect(enhanceCanvas, CFG.maxTargets, CFG.aiThreshold);
    const sx = video.videoWidth / 320, sy = video.videoHeight / 240;
    return preds.map(p => ({
      bbox: [p.bbox[0]*sx, p.bbox[1]*sy, p.bbox[2]*sx, p.bbox[3]*sy],
      label: CLASS_MAP[p.class] || p.class.toUpperCase().slice(0,6),
      rawLabel: p.class,
      score: p.score,
      source: 'ai'
    }));
  } catch(e) { return []; }
}

// ---------- MOTION DETECTION ----------
function runMotionDetection() {
  if (!motionEnabled || !video.videoWidth) return [];
  motionCtx.drawImage(video, 0, 0, 160, 120);
  const current = motionCtx.getImageData(0, 0, 160, 120);
  if (!prevMotionData) { prevMotionData = current; return []; }

  const w = 160, h = 120;
  const mask = new Uint8Array(w * h);
  const cd = current.data, pd = prevMotionData.data;
  const thresh = CFG.motionThreshold * 3;

  for (let i = 0; i < cd.length; i += 4) {
    const diff = Math.abs(cd[i]-pd[i]) + Math.abs(cd[i+1]-pd[i+1]) + Math.abs(cd[i+2]-pd[i+2]);
    mask[i>>2] = diff > thresh ? 255 : 0;
  }
  prevMotionData = current;

  // Morphological close: dilate then erode (simple 3x3)
  const dilated = new Uint8Array(w * h);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      if (mask[y*w+x] || mask[(y-1)*w+x] || mask[(y+1)*w+x] ||
          mask[y*w+x-1] || mask[y*w+x+1]) {
        dilated[y*w+x] = 255;
      }
    }
  }

  // Find blobs via flood fill
  const labels = new Int32Array(w * h);
  let nextLabel = 1;
  const blobs = [];
  const minArea = CFG.minBlobArea;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y * w + x;
      if (dilated[idx] && !labels[idx]) {
        // Flood fill
        let minX=x, maxX=x, minY=y, maxY=y, area=0;
        const stack = [x, y];
        while (stack.length) {
          const cy = stack.pop(), cx = stack.pop();
          if (cx<0||cx>=w||cy<0||cy>=h) continue;
          const ci = cy*w+cx;
          if (!dilated[ci] || labels[ci]) continue;
          labels[ci] = nextLabel;
          area++;
          if (cx<minX) minX=cx; if (cx>maxX) maxX=cx;
          if (cy<minY) minY=cy; if (cy>maxY) maxY=cy;
          stack.push(cx+1,cy, cx-1,cy, cx,cy+1, cx,cy-1);
        }
        if (area >= minArea) {
          const bw = maxX-minX+1, bh = maxY-minY+1;
          blobs.push({ x:minX, y:minY, w:bw, h:bh, area, density: area/(bw*bh) });
        }
        nextLabel++;
      }
    }
  }

  const sx = video.videoWidth / 160, sy = video.videoHeight / 120;
  // Expand bbox slightly for small objects
  return blobs.slice(0, CFG.maxTargets).map(b => {
    const pad = 2;
    const bx = Math.max(0, (b.x-pad)*sx), by = Math.max(0, (b.y-pad)*sy);
    const bw = (b.w+pad*2)*sx, bh = (b.h+pad*2)*sy;
    // Classify motion target by position and shape
    let label = 'CONTACT';
    const inSky = by < video.videoHeight * 0.4;
    const aspect = bw / Math.max(1, bh);
    if (inSky && b.area < 30) label = 'UAV';
    else if (inSky && b.area < 80) label = 'DRONE';
    else if (inSky && aspect > 1.5) label = 'AIR';
    else if (inSky) label = 'AVIAN?';
    else if (aspect < 0.5 && bh > bw*2) label = 'PED?';
    return { bbox:[bx,by,bw,bh], label, rawLabel:'motion', score: Math.min(0.9, 0.2 + b.density*0.5), source:'motion' };
  });
}

// ---------- TARGET TRACKING ----------
function updateTracks(detections) {
  const usedTracks = new Set();
  const usedDets = new Set();

  // Match detections to existing tracks (nearest neighbor)
  for (let di = 0; di < detections.length; di++) {
    const d = detections[di];
    const [dx,dy,dw,dh] = d.bbox;
    const dcx = dx+dw/2, dcy = dy+dh/2;
    let bestDist = Infinity, bestTi = -1;

    for (let ti = 0; ti < tracks.length; ti++) {
      if (usedTracks.has(ti)) continue;
      const t = tracks[ti];
      const dist = Math.hypot(t.cx-dcx, t.cy-dcy);
      const sizeSim = Math.abs(t.w-dw) + Math.abs(t.h-dh);
      const totalDist = dist + sizeSim * 0.3;
      if (totalDist < bestDist && dist < Math.max(t.w, t.h, dw, dh) * 1.5) {
        bestDist = totalDist; bestTi = ti;
      }
    }

    if (bestTi >= 0) {
      const t = tracks[bestTi];
      const a = CFG.smoothAlpha;
      t.x = t.x*(1-a) + dx*a;
      t.y = t.y*(1-a) + dy*a;
      t.w = t.w*(1-a) + dw*a;
      t.h = t.h*(1-a) + dh*a;
      t.cx = t.x+t.w/2; t.cy = t.y+t.h/2;
      t.label = d.label;
      t.rawLabel = d.rawLabel;
      t.score = t.score*(1-a) + d.score*a;
      t.source = d.source;
      t.age++;
      t.missCount = 0;
      t.lastSeen = performance.now();
      usedTracks.add(bestTi);
      usedDets.add(di);
    }
  }

  // Create new tracks for unmatched detections
  for (let di = 0; di < detections.length; di++) {
    if (usedDets.has(di)) continue;
    const d = detections[di];
    const [x,y,w,h] = d.bbox;
    if (tracks.length >= CFG.maxTargets) break;
    tracks.push({
      id: nextTrackId++, x, y, w, h, cx:x+w/2, cy:y+h/2,
      label: d.label, rawLabel: d.rawLabel, score: d.score,
      source: d.source, age: 1, missCount: 0,
      lastSeen: performance.now(), isNew: true, opacity: 1
    });
    playPing(800 + Math.random()*800, 0.05);
  }

  // Fade out missed tracks
  for (let ti = tracks.length - 1; ti >= 0; ti--) {
    const t = tracks[ti];
    if (!usedTracks.has(ti) && t.id !== undefined) {
      t.missCount++;
      t.opacity = Math.max(0, 1 - t.missCount / CFG.fadeOutFrames);
      if (t.missCount > CFG.fadeOutFrames) {
        tracks.splice(ti, 1);
      }
    }
  }

  // Sort by score descending
  tracks.sort((a,b) => b.score - a.score);
}

// ---------- ZOOM CONTROLLER ----------
function setZoom(z, px, py, animate = true) {
  targetZoomLevel = Math.max(1, Math.min(20, z));
  if (px !== undefined) targetPanX = Math.max(0, Math.min(1, px));
  if (py !== undefined) targetPanY = Math.max(0, Math.min(1, py));
  if (!animate) { zoomLevel = targetZoomLevel; panX = targetPanX; panY = targetPanY; }
  document.getElementById('zoom-slider').value = targetZoomLevel;
  document.getElementById('zoom-val').textContent = targetZoomLevel.toFixed(1) + 'x';
}

function interpolateZoom() {
  const a = 0.12;
  zoomLevel += (targetZoomLevel - zoomLevel) * a;
  panX += (targetPanX - panX) * a;
  panY += (targetPanY - panY) * a;
}

// ---------- RENDER ----------
function getVisibleRect() {
  const vw = video.videoWidth, vh = video.videoHeight;
  const rw = vw / zoomLevel, rh = vh / zoomLevel;
  const rx = (vw - rw) * panX;
  const ry = (vh - rh) * panY;
  return { x: rx, y: ry, w: rw, h: rh };
}

function vidToCanvas(vx, vy) {
  const r = getVisibleRect();
  return [(vx - r.x) / r.w * mainCanvas.width, (vy - r.y) / r.h * mainCanvas.height];
}

function drawFrame() {
  if (!video.videoWidth) return;
  const cw = mainCanvas.width, ch = mainCanvas.height;
  const r = getVisibleRect();

  // Draw zoomed video
  mainCtx.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, cw, ch);

  // Slight green tint overlay
  mainCtx.fillStyle = 'rgba(0,20,0,0.06)';
  mainCtx.fillRect(0, 0, cw, ch);

  // Grid overlay
  mainCtx.strokeStyle = 'rgba(0,255,136,0.04)';
  mainCtx.lineWidth = 0.5;
  const gridSize = 60;
  for (let gx = 0; gx < cw; gx += gridSize) {
    mainCtx.beginPath(); mainCtx.moveTo(gx,0); mainCtx.lineTo(gx,ch); mainCtx.stroke();
  }
  for (let gy = 0; gy < ch; gy += gridSize) {
    mainCtx.beginPath(); mainCtx.moveTo(0,gy); mainCtx.lineTo(cw,gy); mainCtx.stroke();
  }

  // Draw tracks
  for (const t of tracks) {
    const [bx, by] = vidToCanvas(t.x, t.y);
    const bw = t.w / r.w * cw;
    const bh = t.h / r.h * ch;

    // Skip if offscreen
    if (bx+bw < 0 || bx > cw || by+bh < 0 || by > ch) continue;
    if (bw < 2 || bh < 2) continue;

    const alpha = t.opacity;
    const confPct = Math.round(t.score * 100);
    let color;
    if (confPct > 70) color = `rgba(0,255,136,${alpha})`;
    else if (confPct > 30) color = `rgba(255,170,0,${alpha})`;
    else color = `rgba(255,34,68,${alpha})`;

    mainCtx.save();
    mainCtx.strokeStyle = color;
    mainCtx.lineWidth = 1.5;
    mainCtx.setLineDash([6, 3]);

    // Animated dash offset
    mainCtx.lineDashOffset = -(performance.now() / 40);

    // Bounding box
    mainCtx.strokeRect(bx, by, bw, bh);
    mainCtx.setLineDash([]);

    // Crosshairs at center
    const ccx = bx + bw/2, ccy = by + bh/2;
    const cr = Math.min(bw, bh) * 0.2;
    mainCtx.beginPath();
    mainCtx.moveTo(ccx - cr, ccy); mainCtx.lineTo(ccx + cr, ccy);
    mainCtx.moveTo(ccx, ccy - cr); mainCtx.lineTo(ccx, ccy + cr);
    mainCtx.strokeStyle = color; mainCtx.lineWidth = 1; mainCtx.stroke();

    // Corner brackets
    const br = Math.min(8, bw*0.2, bh*0.2);
    mainCtx.lineWidth = 2;
    mainCtx.beginPath();
    mainCtx.moveTo(bx, by+br); mainCtx.lineTo(bx, by); mainCtx.lineTo(bx+br, by);
    mainCtx.moveTo(bx+bw-br, by); mainCtx.lineTo(bx+bw, by); mainCtx.lineTo(bx+bw, by+br);
    mainCtx.moveTo(bx+bw, by+bh-br); mainCtx.lineTo(bx+bw, by+bh); mainCtx.lineTo(bx+bw-br, by+bh);
    mainCtx.moveTo(bx+br, by+bh); mainCtx.lineTo(bx, by+bh); mainCtx.lineTo(bx, by+bh-br);
    mainCtx.stroke();

    // Label
    const labelText = `${t.label} ${confPct}%`;
    mainCtx.font = '10px Orbitron, monospace';
    const tw = mainCtx.measureText(labelText).width;
    mainCtx.fillStyle = `rgba(0,0,0,${alpha*0.7})`;
    mainCtx.fillRect(bx, by - 14, tw + 8, 13);
    mainCtx.fillStyle = color;
    mainCtx.fillText(labelText, bx + 4, by - 4);

    // Track ID
    mainCtx.font = '8px Share Tech Mono, monospace';
    mainCtx.fillStyle = `rgba(0,229,255,${alpha*0.7})`;
    mainCtx.fillText(`#${t.id}`, bx + bw - 20, by + bh + 10);

    mainCtx.restore();
  }

  // Center reticle (when zoomed)
  if (zoomLevel > 1.2) {
    const cx = cw/2, cy = ch/2;
    mainCtx.strokeStyle = 'rgba(0,255,136,0.3)';
    mainCtx.lineWidth = 1;
    mainCtx.beginPath();
    mainCtx.arc(cx, cy, 20, 0, Math.PI*2);
    mainCtx.stroke();
    mainCtx.beginPath();
    mainCtx.moveTo(cx-30,cy); mainCtx.lineTo(cx-8,cy);
    mainCtx.moveTo(cx+8,cy); mainCtx.lineTo(cx+30,cy);
    mainCtx.moveTo(cx,cy-30); mainCtx.lineTo(cx,cy-8);
    mainCtx.moveTo(cx,cy+8); mainCtx.lineTo(cx,cy+30);
    mainCtx.stroke();
  }

  // Vignette
  const grad = mainCtx.createRadialGradient(cw/2, ch/2, Math.min(cw,ch)*0.3, cw/2, ch/2, Math.max(cw,ch)*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,10,0,0.5)');
  mainCtx.fillStyle = grad;
  mainCtx.fillRect(0, 0, cw, ch);
}

// ---------- PIP PANEL ----------
let pipElements = [];

function updatePiPs() {
  // Ensure we have enough PiP elements
  const visibleTracks = tracks.filter(t => t.opacity > 0.3).slice(0, CFG.pipMaxVisible);

  // Add missing elements
  while (pipElements.length < visibleTracks.length) {
    const el = document.createElement('div');
    el.className = 'pip-item';
    const cvs = document.createElement('canvas');
    cvs.width = 96; cvs.height = 72;
    el.appendChild(cvs);
    const lbl = document.createElement('div');
    lbl.className = 'pip-label';
    el.appendChild(lbl);
    const conf = document.createElement('div');
    conf.className = 'pip-conf';
    el.appendChild(conf);
    pipPanel.appendChild(el);
    pipElements.push({ el, cvs, lbl, conf, trackId: -1 });
  }

  // Hide extras
  for (let i = 0; i < pipElements.length; i++) {
    const pe = pipElements[i];
    if (i < visibleTracks.length) {
      pe.el.style.display = '';
      const t = visibleTracks[i];
      const ctx = pe.cvs.getContext('2d');

      // Draw zoomed crop
      const pad = 0.3;
      const sx = t.x - t.w*pad, sy = t.y - t.h*pad;
      const sw = t.w*(1+pad*2), sh = t.h*(1+pad*2);
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, 96, 72);

      // Green tint
      ctx.fillStyle = 'rgba(0,255,136,0.05)';
      ctx.fillRect(0,0,96,72);

      pe.lbl.textContent = t.label;
      pe.conf.textContent = Math.round(t.score*100) + '%';

      // New target pulse
      if (t.isNew && pe.trackId !== t.id) {
        pe.el.classList.remove('pip-new');
        void pe.el.offsetWidth;
        pe.el.classList.add('pip-new');
      }
      pe.trackId = t.id;

      // Tap handler
      pe.el.onclick = () => autoZoomToTarget(t);
    } else {
      pe.el.style.display = 'none';
    }
  }
}

// ---------- AUTO ZOOM & CAPTURE ----------
function autoZoomToTarget(t) {
  initAudio();
  playPing(1800, 0.1);

  // Calculate zoom to make target fill ~60% of view
  const zfw = video.videoWidth / (t.w / 0.6);
  const zfh = video.videoHeight / (t.h / 0.6);
  const z = Math.min(zfw, zfh, 20);
  const px = (t.cx) / video.videoWidth;
  const py = (t.cy) / video.videoHeight;
  setZoom(z, px, py, true);

  showToast('LOCKING TARGET #' + t.id);

  // Capture after zoom settles
  clearTimeout(autoZoomTimer);
  autoZoomTimer = setTimeout(() => {
    captureSnapshot(t);
    setTimeout(() => {
      setZoom(1, 0.5, 0.5, true);
      showToast('CAPTURED #' + t.id);
    }, 800);
  }, 1200);
}

function captureSnapshot(t) {
  // Flash effect
  const flash = document.getElementById('flash');
  flash.classList.add('fire');
  setTimeout(() => flash.classList.remove('fire'), 150);

  // High-res capture from video
  const capCanvas = document.createElement('canvas');
  const pad = 0.5;
  const sx = Math.max(0, t.x - t.w*pad);
  const sy = Math.max(0, t.y - t.h*pad);
  const sw = Math.min(video.videoWidth - sx, t.w*(1+pad*2));
  const sh = Math.min(video.videoHeight - sy, t.h*(1+pad*2));
  capCanvas.width = Math.round(sw * 2);
  capCanvas.height = Math.round(sh * 2);
  const cctx = capCanvas.getContext('2d');

  // Sharpen + contrast
  cctx.filter = 'contrast(1.3) brightness(1.05)';
  cctx.drawImage(video, sx, sy, sw, sh, 0, 0, capCanvas.width, capCanvas.height);
  cctx.filter = 'none';

  // Overlay info
  cctx.font = 'bold 14px Orbitron, monospace';
  cctx.fillStyle = '#00ff88';
  cctx.fillText(`NEXUS EYE | ${t.label} | ${Math.round(t.score*100)}% | #${t.id}`, 8, 20);
  cctx.fillText(new Date().toISOString(), 8, 38);

  // Download
  const link = document.createElement('a');
  link.download = `nexus_eye_${t.label}_${t.id}_${Date.now()}.png`;
  link.href = capCanvas.toDataURL('image/png');
  link.click();

  playPing(2400, 0.15);
}

// Manual capture of current zoomed view
function manualCapture() {
  initAudio();
  const flash = document.getElementById('flash');
  flash.classList.add('fire');
  setTimeout(() => flash.classList.remove('fire'), 150);

  const r = getVisibleRect();
  const capCanvas = document.createElement('canvas');
  capCanvas.width = Math.round(r.w); capCanvas.height = Math.round(r.h);
  const cctx = capCanvas.getContext('2d');
  cctx.filter = 'contrast(1.2) brightness(1.05)';
  cctx.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, capCanvas.width, capCanvas.height);
  cctx.filter = 'none';

  cctx.font = 'bold 16px Orbitron, monospace';
  cctx.fillStyle = '#00ff88';
  cctx.fillText(`NEXUS EYE | ZOOM ${zoomLevel.toFixed(1)}x`, 8, 24);
  cctx.fillText(new Date().toISOString(), 8, 44);

  const link = document.createElement('a');
  link.download = `nexus_eye_capture_${Date.now()}.png`;
  link.href = capCanvas.toDataURL('image/png');
  link.click();

  playPing(2000, 0.1);
  showToast('FRAME CAPTURED');
}

// ---------- TOAST ----------
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

// ---------- HUD UPDATE ----------
function updateHUD() {
  document.getElementById('tgt-count').textContent = tracks.length;
  const tl = document.getElementById('threat-level');
  const tb = document.getElementById('threat-box');
  if (tracks.length < 5) { tl.textContent = 'CLEAR'; tl.style.color = '#00ff88'; }
  else if (tracks.length < 20) { tl.textContent = 'ALERT'; tl.style.color = '#ffaa00'; }
  else if (tracks.length < 50) { tl.textContent = 'HIGH'; tl.style.color = '#ff6622'; }
  else { tl.textContent = 'CRITICAL'; tl.style.color = '#ff2244'; }
}

// ---------- PINCH ZOOM ----------
let lastPinchDist = 0;
let isPinching = false;

function handleTouchStart(e) {
  if (e.touches.length === 2) {
    isPinching = true;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.hypot(dx, dy);
  } else if (e.touches.length === 1) {
    // Check if tapping a bounding box
    const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
    handleCanvasTap(tx, ty);
  }
}

function handleTouchMove(e) {
  if (!isPinching || e.touches.length !== 2) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.hypot(dx, dy);
  const scale = dist / lastPinchDist;
  setZoom(zoomLevel * scale);
  lastPinchDist = dist;
}

function handleTouchEnd() { isPinching = false; }

function handleCanvasTap(cx, cy) {
  // Check if tap hits a track
  const r = getVisibleRect();
  const vx = cx / mainCanvas.width * r.w + r.x;
  const vy = cy / mainCanvas.height * r.h + r.y;

  for (const t of tracks) {
    if (vx >= t.x && vx <= t.x+t.w && vy >= t.y && vy <= t.y+t.h) {
      autoZoomToTarget(t);
      return;
    }
  }
}

// ---------- MAIN LOOP ----------
async function mainLoop() {
  if (!running) return;
  const now = performance.now();

  // FPS counter
  fpsCounter++;
  if (now - lastFpsTime > 1000) {
    displayFps = fpsCounter;
    fpsCounter = 0;
    lastFpsTime = now;
    document.getElementById('fps-val').textContent = displayFps;
  }

  // AI detection at configured interval
  let aiDetections = [];
  if (aiEnabled && now - lastDetectTime > CFG.detectionInterval) {
    lastDetectTime = now;
    aiDetections = await runAIDetection();
  }

  // Motion detection at higher rate
  let motionDetections = [];
  if (motionEnabled && now - lastMotionTime > CFG.motionInterval) {
    lastMotionTime = now;
    motionDetections = runMotionDetection();
  }

  // Merge detections (avoid duplicates from motion near AI detections)
  const allDetections = [...aiDetections];
  for (const md of motionDetections) {
    let isDuplicate = false;
    for (const ad of aiDetections) {
      const overlapX = Math.max(0, Math.min(md.bbox[0]+md.bbox[2], ad.bbox[0]+ad.bbox[2]) - Math.max(md.bbox[0], ad.bbox[0]));
      const overlapY = Math.max(0, Math.min(md.bbox[1]+md.bbox[3], ad.bbox[1]+ad.bbox[3]) - Math.max(md.bbox[1], ad.bbox[1]));
      const overlapArea = overlapX * overlapY;
      const mdArea = md.bbox[2] * md.bbox[3];
      if (mdArea > 0 && overlapArea / mdArea > 0.5) { isDuplicate = true; break; }
    }
    if (!isDuplicate) allDetections.push(md);
  }

  // Update tracking
  if (allDetections.length > 0) {
    updateTracks(allDetections);
  } else {
    // Still fade out missed tracks
    for (const t of tracks) {
      t.missCount++;
      t.opacity = Math.max(0, 1 - t.missCount / CFG.fadeOutFrames);
    }
    tracks = tracks.filter(t => t.missCount <= CFG.fadeOutFrames);
  }

  // Interpolate zoom
  interpolateZoom();

  // Render
  drawFrame();

  // Update PiP and HUD every few frames
  if (fpsCounter % 4 === 0) {
    updatePiPs();
    updateHUD();
  }

  // Mark tracks as no longer new after first render
  for (const t of tracks) t.isNew = false;

  requestAnimationFrame(mainLoop);
}

// ---------- SETTINGS ----------
function setupSettings() {
  document.getElementById('btn-settings').onclick = () => {
    document.getElementById('settings-modal').classList.add('open');
  };
  document.getElementById('btn-close-settings').onclick = () => {
    document.getElementById('settings-modal').classList.remove('open');
  };

  document.getElementById('s-ai-thresh').oninput = function() { CFG.aiThreshold = parseFloat(this.value); };
  document.getElementById('s-mot-thresh').oninput = function() { CFG.motionThreshold = parseInt(this.value); };
  document.getElementById('s-min-blob').oninput = function() { CFG.minBlobArea = parseInt(this.value); };
  document.getElementById('s-max-tgt').oninput = function() { CFG.maxTargets = parseInt(this.value); };
  document.getElementById('s-smooth').onchange = function() { CFG.smoothAlpha = this.checked ? 0.3 : 0.9; };
  document.getElementById('s-sound').onchange = function() { CFG.soundEnabled = this.checked; };
  document.getElementById('s-scanlines').onchange = function() {
    CFG.scanlines = this.checked;
    document.getElementById('scanline').style.display = this.checked ? '' : 'none';
    document.getElementById('sweep').style.display = this.checked ? '' : 'none';
  };
  document.getElementById('s-enhance').oninput = function() { CFG.enhanceContrast = parseFloat(this.value); };
}

// ---------- BUTTON HANDLERS ----------
function setupButtons() {
  document.getElementById('btn-ai').onclick = function() {
    aiEnabled = !aiEnabled;
    this.classList.toggle('active', aiEnabled);
  };
  document.getElementById('btn-motion').onclick = function() {
    motionEnabled = !motionEnabled;
    this.classList.toggle('active', motionEnabled);
  };
  document.getElementById('btn-capture').onclick = manualCapture;
  document.getElementById('zoom-slider').oninput = function() {
    setZoom(parseFloat(this.value), undefined, undefined, true);
  };

  // Touch events for pinch zoom on canvas
  mainCanvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  mainCanvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  mainCanvas.addEventListener('touchend', handleTouchEnd);

  // Mouse wheel zoom
  mainCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    setZoom(zoomLevel * delta);
  }, { passive: false });
}

// ---------- INIT ----------
async function init() {
  try {
    initCanvases();
    await initCamera();
    await initModel();
    setupButtons();
    setupSettings();

    // Hide loader
    setTimeout(() => document.getElementById('loader').classList.add('hidden'), 600);

    // Start main loop
    requestAnimationFrame(mainLoop);
  } catch(e) {
    document.getElementById('load-status').textContent = 'FATAL: ' + e.message;
  }
}

// Ensure audio context starts on user interaction
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

init();
</script>
